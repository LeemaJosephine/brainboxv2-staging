apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: brainbox
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 232939969354.dkr.ecr.ap-south-1.amazonaws.com/dev-brainbox-frontend:18
        imagePullPolicy: Always
        ports:
        - containerPort: 80
