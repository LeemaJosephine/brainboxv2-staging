version: '3.8'

services:

  backend:
    build:
      context: ./server
    container_name: brainbox-backend
    ports:
      - "5000:5000"

    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/brainbox
      JWT_SECRET: brainbox123

    depends_on:
      - mongo

  frontend:
    build:
      context: ./client

    container_name: brainbox-frontend

    ports:
      - "80:80"

    depends_on:
      - backend

  mongo:
    image: mongo:7

    container_name: brainbox-mongodb

    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

volumes:

  mongo-data:
